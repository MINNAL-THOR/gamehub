<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let heroImg = new Image();
heroImg.src = "../assets/hero.png";

let mouse = { x: canvas.width/2, y: canvas.height/2 };

let player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 220,
    speed: 4,
    angle: 0
};

let bullets = [];
let keys = {};

/* ================= MOBILE CONTROL VARIABLES ================= */

let isTouch = "ontouchstart" in window;

let leftTouch = null;
let rightTouch = null;

let leftStart = {x:0,y:0};
let rightStart = {x:0,y:0};

/* ================= INPUT ================= */

document.addEventListener("mousemove", (e)=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

document.addEventListener("keydown", e=> keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);

document.addEventListener("click", shoot);

/* ================= MOBILE TOUCH CONTROLS ================= */

canvas.addEventListener("touchstart", (e)=>{

    for(let t of e.changedTouches){

        if(t.clientX < canvas.width/2 && leftTouch === null){
            leftTouch = t.identifier;
            leftStart.x = t.clientX;
            leftStart.y = t.clientY;
        }

        else if(t.clientX >= canvas.width/2 && rightTouch === null){
            rightTouch = t.identifier;
            rightStart.x = t.clientX;
            rightStart.y = t.clientY;
        }

    }

});

canvas.addEventListener("touchmove", (e)=>{

    for(let t of e.changedTouches){

        /* LEFT JOYSTICK MOVEMENT */

        if(t.identifier === leftTouch){

            let dx = t.clientX - leftStart.x;
            let dy = t.clientY - leftStart.y;

            player.x += dx * 0.05;
            player.y += dy * 0.05;

            leftStart.x = t.clientX;
            leftStart.y = t.clientY;
        }

        /* RIGHT JOYSTICK AIM */

        if(t.identifier === rightTouch){

            mouse.x = t.clientX;
            mouse.y = t.clientY;
        }

    }

});

canvas.addEventListener("touchend", (e)=>{

    for(let t of e.changedTouches){

        if(t.identifier === leftTouch){
            leftTouch = null;
        }

        if(t.identifier === rightTouch){
            rightTouch = null;
        }

    }

});

/* ================= SHOOT ================= */

function shoot(){

    let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
    let width = player.size;
    let height = width / aspect;

    let forward = player.angle - Math.PI/2;

    let noseX = player.x + Math.cos(forward) * (height/2);
    let noseY = player.y + Math.sin(forward) * (height/2);

    let speed = 10;

    bullets.push({
        x: noseX,
        y: noseY,
        dx: Math.cos(forward) * speed,
        dy: Math.sin(forward) * speed,
        size: 8
    });
}

/* ================= UPDATE ================= */

function update(){

    /* DESKTOP MOVEMENT */

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    /* BULLET MOVEMENT */

    for(let i=bullets.length-1;i>=0;i--){

        let b = bullets[i];

        b.x += b.dx;
        b.y += b.dy;

        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height){
            bullets.splice(i,1);
        }

    }

}

/* ================= DRAW ================= */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();

    ctx.translate(player.x, player.y);

    ctx.rotate(player.angle + Math.PI/2);

    let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
    let width = player.size;
    let height = width / aspect;

    ctx.drawImage(heroImg, -width/2, -height/2, width, height);

    ctx.restore();

    ctx.fillStyle = "yellow";

    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
        ctx.fill();
    });

}

/* ================= LOOP ================= */

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
